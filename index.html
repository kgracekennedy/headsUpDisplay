<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#18243f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="A family heads-up display for rotating checklists, reminders, and celebration screens."
    />
    <title>Family Heads Up Display</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.svg" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div class="loading-state">
        <p class="eyebrow">Heads Up Display</p>
        <h1>Loading family board...</h1>
        <p>Building the next active checklist and reminder set.</p>
      </div>
    </div>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
