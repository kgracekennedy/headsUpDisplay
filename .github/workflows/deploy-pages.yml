name: Validate Heads Up Display

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node --test --test-isolation=none tests/*.test.mjs
      - run: node scripts/build-site.mjs
